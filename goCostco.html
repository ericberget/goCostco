<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costco List — Berget Family</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #FAFAF7; min-height: 100vh; }
  #app { max-width: 700px; margin: 0 auto; padding: 20px 12px; }

  /* Print styles */
  @media print {
    .np { display: none !important; }
    .off-item { display: none !important; }
    body { background: white !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .store-chk { display: flex !important; }
    #app { padding: 8px; }
    .ir { min-height: 60px !important; padding: 4px 10px !important; }
    .th { width: 72px !important; height: 72px !important; }
    .te-print { width: 72px !important; height: 72px !important; display: block !important; }
    .te { display: none !important; }
  }
  @media screen { .store-chk { display: none !important; } .te-print { display: none !important; } }

  /* Item rows */
  .ir { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; min-height: 78px; }
  .ir:hover { background: rgba(0,0,0,.025); }
  .ir.off { opacity: .4; min-height: 44px; padding: 6px 14px; }
  .ir.off:hover { opacity: .7; }

  /* Toggle pill */
  .pill { width: 32px; height: 18px; border-radius: 9px; background: #DDD; flex-shrink: 0; position: relative; transition: background .2s; cursor: pointer; opacity: .6; }
  .pill.on { background: #C8BBA8; opacity: .7; }
  .pill-dot { width: 14px; height: 14px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .pill.on .pill-dot { transform: translateX(14px); }

  /* Store checkbox (print only) */
  .store-chk { width: 22px; height: 22px; border: 2px solid #999; border-radius: 5px; flex-shrink: 0; }

  /* Thumbnails */
  .th { width: 96px; height: 96px; border-radius: 10px; object-fit: cover; background: #F0F0ED; flex-shrink: 0; border: 1px solid #E8E8E4; }
  .te { width: 96px; height: 96px; border-radius: 10px; background: #F0F0ED; flex-shrink: 0; border: 2px dashed #D0D0CC; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; color: #BBB; cursor: pointer; transition: all .15s; font-size: 11px; }
  .te:hover, .te.over { border-color: #D97B3A; background: #FFF5EB; color: #D97B3A; }
  .te.over { border-width: 3px; }
  .te-print { width: 96px; height: 96px; border-radius: 10px; background: #F5F5F0; flex-shrink: 0; border: 1px solid #E0E0E0; }
  .th-sm { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .rm-img { position: absolute; top: -4px; right: -4px; background: #C44; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

  /* Category headers */
  .cat-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px 8px 0 0; }
  .cat-body { background: white; border-radius: 0 0 8px 8px; border: 1px solid #EEEEE8; border-top: none; box-shadow: 0 1px 2px rgba(0,0,0,.03); overflow: hidden; }
  .sep { height: 1px; background: #F4F4F0; margin: 0 10px; }

  /* Inputs */
  input, textarea, select { font-family: 'DM Sans', sans-serif; font-size: 14px; border: 1.5px solid #DDD; border-radius: 8px; padding: 7px 11px; outline: none; background: white; }
  input:focus, textarea:focus, select:focus { border-color: #D97B3A; }
  .b { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 12px; border: none; border-radius: 7px; padding: 7px 14px; cursor: pointer; transition: all .12s; display: inline-flex; align-items: center; gap: 5px; }
  .b:hover { transform: translateY(-1px); }
  .bp { background: #D97B3A; color: white; } .bp:hover { background: #C06A2E; }
  .bs { background: #EEEDE8; color: #555; } .bs:hover { background: #E0DFD8; }
  .bd { background: #FEE; color: #C44; } .bd:hover { background: #FDD; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 18px; border-radius: 10px; overflow: hidden; border: 1.5px solid #DDD; }
  .tab { flex: 1; padding: 10px; text-align: center; font-weight: 600; font-size: 13px; cursor: pointer; transition: all .15s; background: white; color: #888; }
  .tab.active { background: #2C2C2C; color: white; }
  .tab:not(:last-child) { border-right: 1.5px solid #DDD; }

  /* Counter badge */
  .badge { background: #D97B3A; color: white; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 6px; }
</style>
</head>

  {id:27,name:"Oranges \u2013 littles",cat:"Produce",note:"Cuties/clementines",on:true},
  {id:28,name:"Blueberries",cat:"Produce",note:"",on:true},
];

function matchImg(n){const l=n.toLowerCase();for(const[k,v]of Object.entries(DOC_IMAGES)){if(l.includes(k)||k.includes(l))return v;}for(const[k,v]of Object.entries(WEB_IMAGES)){if(l===k)return v;}return null;}

function resizeImage(file){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const m=200;let w=img.width,ht=img.height;if(w>ht){if(w>m){ht=ht*m/w;w=m;}}else{if(ht>m){w=w*m/ht;ht=m;}}const c=document.createElement("canvas");c.width=w;c.height=ht;c.getContext("2d").drawImage(img,0,0,w,ht);r(c.toDataURL("image/jpeg",.7));};img.src=e.target.result;};rd.readAsDataURL(file);});}

function ld(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function App(){
  const [pantry,setPantry]=useState(()=>ld("costco-pantry",INIT));
  const [imgDb,setImgDb]=useState(()=>ld("costco-imgs2",{}));
  const [view,setView]=useState("week"); // "week" | "pantry"
  const [brokenImgs,setBrokenImgs]=useState({});
  const [dragOver,setDragOver]=useState(null);
  const [showAddNew,setShowAddNew]=useState(false);
  const [nn,setNn]=useState("");
  const [nc,setNc]=useState(CATS[0]);
  const [nNote,setNNote]=useState("");
  const fileRefs=useRef({});

  useEffect(()=>{sv("costco-pantry",pantry);},[pantry]);
  useEffect(()=>{sv("costco-imgs2",imgDb);},[imgDb]);

  const togWeek=(id)=>setPantry(p=>p.map(i=>i.id===id?{...i,on:!i.on}:i));
  const rmFromPantry=(id)=>setPantry(p=>p.filter(i=>i.id!==id));
  const updateNote=(id,note)=>setPantry(p=>p.map(i=>i.id===id?{...i,note}:i));
  const selectAll=(cat)=>setPantry(p=>p.map(i=>i.cat===cat?{...i,on:true}:i));
  const deselectAll=(cat)=>setPantry(p=>p.map(i=>i.cat===cat?{...i,on:false}:i));

  const addNew=()=>{
    if(!nn.trim())return;
    setPantry(p=>[...p,{id:Date.now(),name:nn.trim(),cat:nc,note:nNote.trim(),on:true}]);
    setNn("");setNNote("");
  };

  const handleImageFile=async(name,file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const b64=await resizeImage(file);
    setImgDb(p=>({...p,[name.toLowerCase()]:b64}));
    setBrokenImgs(p=>{const n={...p};delete n[name.toLowerCase()];return n;});
  };
  const handleDrop=(e,name)=>{
    e.preventDefault();e.stopPropagation();setDragOver(null);
    const file=e.dataTransfer.files?.[0];
    if(file){handleImageFile(name,file);return;}
    const url=e.dataTransfer.getData("text/uri-list")||e.dataTransfer.getData("text/plain");
    if(url&&url.startsWith("http")){setImgDb(p=>({...p,[name.toLowerCase()]:url.trim()}));setBrokenImgs(p=>{const n={...p};delete n[name.toLowerCase()];return n;});}
  };
  const handleDragOver=(e,n)=>{e.preventDefault();setDragOver(n);};
  const handleDragLeave=()=>setDragOver(null);
  const rmImg=(n)=>setImgDb(p=>{const x={...p};delete x[n.toLowerCase()];return x;});
  const getImg=(n)=>imgDb[n.toLowerCase()]||matchImg(n);

  const allC=[...new Set(pantry.map(i=>i.cat))];
  const sortC=[...CATS.filter(c=>allC.includes(c)),...allC.filter(c=>!CATS.includes(c))];
  const weekItems=pantry.filter(i=>i.on);
  const weekCount=weekItems.length;
  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const isPantryView=view==="pantry";

  return h("div",{id:"app"},

    // Header
    h("div",{style:{textAlign:"center",marginBottom:16}},
      h("div",{style:{fontSize:11,color:"#AAA",letterSpacing:3,textTransform:"uppercase"}},"Costco Run"),
      h("h1",{style:{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:"#2A2A2A",margin:"2px 0"}},"Shopping List"),
      h("div",{style:{fontSize:12,color:"#BBB"}},today)
    ),

    // Tabs
    h("div",{className:"np tabs"},
      h("div",{className:"tab"+(view==="week"?" active":""),onClick:()=>setView("week")},
        "\u{1F6D2} This Week",weekCount>0&&h("span",{className:"badge"},weekCount)),
      h("div",{className:"tab"+(view==="pantry"?" active":""),onClick:()=>setView("pantry")},
        "\u{1F4E6} Full Pantry",h("span",{className:"badge",style:{background:"#888"}},pantry.length))
    ),

    // Actions
    h("div",{className:"np",style:{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:16}},
      h("button",{className:"b bs",onClick:()=>window.print()},"\u{1F5A8}\uFE0F Print this week\u2019s list"),
      isPantryView&&h("button",{className:"b bs",onClick:()=>setShowAddNew(!showAddNew)},showAddNew?"\u2715 Cancel":"+ Add new item"),
    ),

    // Add new item panel
    showAddNew&&isPantryView&&h("div",{className:"np",style:{background:"white",borderRadius:10,border:"1px solid #EEE",padding:16,marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}},
      h("div",{style:{fontWeight:700,fontSize:14,marginBottom:10}},"Add new item to pantry"),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
        h("input",{style:{flex:"2 1 160px"},placeholder:"Item name...",value:nn,onChange:e=>setNn(e.target.value),onKeyDown:e=>e.key==="Enter"&&addNew()}),
        h("select",{style:{flex:"1 1 130px"},value:nc,onChange:e=>setNc(e.target.value)},CATS.map(c=>h("option",{key:c,value:c},c))),
        h("button",{className:"b bp",onClick:addNew},"+ Add")
      ),
      h("input",{style:{width:"100%"},placeholder:"Note (optional)...",value:nNote,onChange:e=>setNNote(e.target.value)})
    ),

    // Category groups
    sortC.map(cat=>{
      const ci=pantry.filter(i=>i.cat===cat);
      const onItems=ci.filter(i=>i.on);
      const offItems=ci.filter(i=>!i.on);
      const s=CS[cat]||DS;

      // In week view, skip categories with nothing selected
      if(!isPantryView&&onItems.length===0)return null;

      return h("div",{key:cat,style:{marginBottom:16}},
        h("div",{className:"cat-head",style:{background:s.bg,borderLeft:"4px solid "+s.a}},
          h("span",{style:{fontSize:17}},s.i),
          h("span",{style:{fontWeight:700,fontSize:14,color:"#333",letterSpacing:.5,textTransform:"uppercase"}},cat),
          h("span",{style:{fontSize:11,color:"#999",marginLeft:"auto",fontWeight:600}},onItems.length+"/"+ci.length),
          isPantryView&&h(F,null,
            h("button",{className:"b np",style:{fontSize:10,padding:"3px 8px",background:"#E8E8E4",color:"#666",marginLeft:6},onClick:()=>selectAll(cat)},"All"),
            h("button",{className:"b np",style:{fontSize:10,padding:"3px 8px",background:"#E8E8E4",color:"#666"},onClick:()=>deselectAll(cat)},"None")
          )
        ),
        h("div",{className:"cat-body"},

          // ON items (always shown)
          onItems.map((item,idx)=>{
            const img=getImg(item.name);
            const broken=brokenImgs[item.name.toLowerCase()];
            const isOver=dragOver===item.name;
            return h("div",{key:item.id},
              idx>0&&h("div",{className:"sep"}),
              h("div",{className:"ir",onClick:()=>togWeek(item.id)},

                // Print: empty checkbox. Screen: toggle pill.
                h("div",{className:"store-chk"}),
                h("div",{className:"pill np"+(item.on?" on":"")},h("div",{className:"pill-dot"})),

                // Image
                img&&!broken
                  ? h("div",{style:{position:"relative",flexShrink:0}},
                      h("img",{className:"th",src:img,alt:item.name,
                        onDrop:e=>handleDrop(e,item.name),onDragOver:e=>handleDragOver(e,item.name),onDragLeave:handleDragLeave,
                        onClick:e=>{e.stopPropagation();fileRefs.current[item.id]?.click();},
                        onError:()=>setBrokenImgs(p=>({...p,[item.name.toLowerCase()]:true}))}),
                      h("button",{className:"rm-img np",onClick:e=>{e.stopPropagation();rmImg(item.name);}},"\u2715"),
                      h("input",{type:"file",accept:"image/*",ref:el=>fileRefs.current[item.id]=el,style:{display:"none"},onChange:e=>{if(e.target.files[0])handleImageFile(item.name,e.target.files[0]);}})
                    )
                  : h(F,null,
                      h("div",{className:"te np"+(isOver?" over":""),
                        onDrop:e=>handleDrop(e,item.name),onDragOver:e=>handleDragOver(e,item.name),onDragLeave:handleDragLeave,
                        onClick:e=>{e.stopPropagation();fileRefs.current[item.id]?.click();}},
                        h("span",{style:{fontSize:20,lineHeight:1}},"\u{1F4F7}"),h("span",null,"drop or tap"),
                        h("input",{type:"file",accept:"image/*",ref:el=>fileRefs.current[item.id]=el,style:{display:"none"},onChange:e=>{if(e.target.files[0])handleImageFile(item.name,e.target.files[0]);}})
                      ),
                      h("div",{className:"te-print"})
                    ),

                // Text
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{fontSize:15,color:"#333",fontWeight:500}},item.name),
                  item.note&&h("div",{style:{fontSize:12,color:"#AAA",marginTop:2,fontStyle:"italic"}},item.note)
                ),

                // Delete from pantry (only in pantry view)
                isPantryView&&h("button",{className:"np",style:{opacity:.3,background:"none",border:"none",color:"#C44",cursor:"pointer",fontSize:14,padding:"2px 6px"},
                  onClick:e=>{e.stopPropagation();if(confirm("Remove \""+item.name+"\" from pantry permanently?"))rmFromPantry(item.id);}},"\u2715")
              )
            );
          }),

          // OFF items (only in pantry view, compact)
          isPantryView&&offItems.length>0&&h(F,null,
            onItems.length>0&&h("div",{style:{height:2,background:"#E8E8E4",margin:"4px 0"}}),
            offItems.map((item,idx)=>{
              const img=getImg(item.name);
              const broken=brokenImgs[item.name.toLowerCase()];
              return h("div",{key:item.id,className:"off-item"},
                idx>0&&h("div",{className:"sep"}),
                h("div",{className:"ir off",onClick:()=>togWeek(item.id)},
                  h("div",{className:"pill np"},h("div",{className:"pill-dot"})),
                  img&&!broken?h("img",{className:"th-sm",src:img,alt:item.name,onError:()=>setBrokenImgs(p=>({...p,[item.name.toLowerCase()]:true}))}):null,
                  h("div",{style:{flex:1,minWidth:0}},
                    h("span",{style:{fontSize:13,color:"#999"}},item.name)
                  ),
                  h("button",{className:"np",style:{opacity:.3,background:"none",border:"none",color:"#C44",cursor:"pointer",fontSize:14,padding:"2px 6px"},
                    onClick:e=>{e.stopPropagation();if(confirm("Remove \""+item.name+"\" from pantry permanently?"))rmFromPantry(item.id);}},"\u2715")
                )
              );
            })
          )
        )
      );
    }),

    // Footer
    h("div",{style:{textAlign:"center",marginTop:28,fontSize:10,color:"#D0D0CC",letterSpacing:1.5}},"BERGET FAMILY \u00B7 COSTCO RUN")
  );
}

ReactDOM.render(h(App),document.getElementById("app"));
</script>
</body>
</html>
